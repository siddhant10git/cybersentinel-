name: cybersentinel
version: "2.0.0"
description: >
  Cybersecurity threat-intelligence triage environment for AI agents.
  Five difficulty-graded tasks — agents classify alerts, assign priorities,
  correlate multi-stage attacks, and resist adversarial disinformation.
  Features a kill-chain bonus, cross-alert correlation reward, and a
  disinformation-resistance scoring component.
author: CyberSentinel Team
license: MIT
tags:
  - openenv
  - cybersecurity
  - triage
  - threat-intelligence
  - soc-analyst
  - adversarial-robustness
  - disinformation

tasks:
  - id: easy
    name: "Routine Shift"
    difficulty: easy
    description: >
      7 alerts with clear signals. 3 false positives. 3 trustworthy intel
      reports including one that cross-links the phishing/PowerShell attack chain.
    num_alerts: 7
    max_steps: 12

  - id: medium
    name: "Busy Day"
    difficulty: medium
    description: >
      12 alerts in shuffled order. 5 FPs, 5 TPs, 2 NEEDS_ESCALATION.
      Correlated multi-stage attack with a mildly misleading draft intel report.
    num_alerts: 12
    max_steps: 18

  - id: hard
    name: "APT Campaign"
    difficulty: hard
    description: >
      17 alerts tracing a full APT kill chain. 6 FPs, 9 TPs, 2 NE.
      7 intel reports — 3 are adversarial disinformation.
      Kill-chain bonus (+0.10) for classifying 6+ campaign alerts correctly.
    num_alerts: 17
    max_steps: 25

  - id: insider
    name: "Insider Threat"
    difficulty: medium
    description: >
      8 alerts. A privileged user exfiltrating data via cloud storage (OneDrive,
      Dropbox, personal Gmail). No malware, no C2, valid certificates.
      Requires behavioural reasoning and policy violation detection.
    num_alerts: 8
    max_steps: 14

  - id: zero
    name: "Zero Alert Shift"
    difficulty: easy
    description: >
      5 alerts — ALL false positives. Tests over-trigger bias. Agents that
      classify everything as TP score 0. Uses baseline intel to explain each.
    num_alerts: 5
    max_steps: 8

observation_space:
  type: object
  fields:
    pending_alerts: "List of alert dicts awaiting classification"
    intel_reports: "List of threat intelligence report dicts"
    current_alert: "The alert to classify this step (or null)"
    time_remaining: "Steps remaining in the episode"
    alerts_processed: "Number of alerts classified so far"
    alerts_total: "Total alerts in the task"
    running_reward_avg: "Running average of per-step rewards (in-episode signal)"
    steps_warning: "True when ≤ 3 steps remain"

action_space:
  type: object
  fields:
    alert_id: "ID of the alert being classified"
    classification: "true_positive | false_positive | needs_escalation"
    priority: "Integer 1-5 (5 = most critical)"
    justification: "Free-text reasoning (max 2000 chars)"

reward:
  range: [0.0, 1.0]
  components:
    classification_accuracy: 0.35
    priority_accuracy: 0.25
    justification_quality: 0.15
    disinformation_resistance: 0.20
    cross_alert_correlation: 0.10
    time_penalty: -0.10
  bonuses:
    kill_chain_bonus: "+0.10 (hard task, ≥6 chain alerts correct)"

api:
  port: 7860
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    tasks: GET /tasks
    grade: POST /grade
    health: GET /health
    docs: GET /docs
