name: cybersentinel
version: "1.0.0"
description: >
  Cybersecurity threat-intelligence triage environment.
  AI agents learn to classify, prioritize, and respond to security alerts
  under time pressure — with adversarial disinformation at higher difficulty.
author: CyberSentinel Team
license: MIT
tags:
  - openenv
  - cybersecurity
  - triage
  - threat-intelligence
  - soc-analyst

tasks:
  - id: easy
    name: "Routine Shift"
    difficulty: easy
    description: >
      5 alerts with clear signals. 2 false positives. Trustworthy intel reports.
    num_alerts: 5
    max_steps: 10

  - id: medium
    name: "Busy Day"
    difficulty: medium
    description: >
      10 alerts with subtler signals. 4 false positives. Correlated attack patterns.
    num_alerts: 10
    max_steps: 15

  - id: hard
    name: "APT Campaign"
    difficulty: hard
    description: >
      15 alerts tracing a full APT kill chain. 5 false positives.
      2 adversarial disinformation reports planted by the attacker.
    num_alerts: 15
    max_steps: 20

observation_space:
  type: object
  fields:
    pending_alerts: "List of alert dicts awaiting classification"
    intel_reports: "List of threat intelligence report dicts"
    current_alert: "The alert to classify this step (or null)"
    time_remaining: "Steps remaining in the episode"
    alerts_processed: "Number of alerts classified so far"
    alerts_total: "Total alerts in the task"
    current_score: "Running average score"

action_space:
  type: object
  fields:
    alert_id: "ID of the alert being classified"
    classification: "true_positive | false_positive | needs_escalation"
    priority: "Integer 1-5 (5 = most critical)"
    justification: "Free-text reasoning for the classification"

reward:
  range: [0.0, 1.0]
  components:
    classification_accuracy: 0.35
    priority_accuracy: 0.25
    justification_quality: 0.15
    disinformation_resistance: 0.20
    time_penalty: -0.05

api:
  port: 7860
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    tasks: GET /tasks
    health: GET /health
